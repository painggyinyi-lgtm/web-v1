name = "kp-anon-website"
main = "src/index.ts" # သို့မဟုတ် project setup အတိုင်း (Next.js ဆိုလျှင် မလိုပါ)
compatibility_date = "2024-04-01"

# ၁။ R2 Bucket ပုံတွေသိမ်းဖို့ Binding
[[r2_buckets]]
binding = "MY_BUCKET"           # Code ထဲမှာ သုံးထားတဲ့ အမည် (မပြောင်းပါနဲ့)
bucket_name = "trail"    # Cloudflare Dashboard ထဲမှာ ဆောက်ထားတဲ့ Bucket နာမည်

# ၂။ D1 Database စာတွေသိမ်းဖို့ Binding
[[d1_databases]]
binding = "DB"                  # Code ထဲမှာ သုံးထားတဲ့ အမည် (မပြောင်းပါနဲ့)
database_name = "kpanon-db"     # Cloudflare Dashboard ထဲမှာ ဆောက်ထားတဲ့ Database နာမည်
database_id = "8335c40741d06aa6838953c2828d6599"  # သင့်ရဲ့ D1 Database ID ကို ဒီမှာ ထည့်ပါ

# ၃။ Environment Variables (လိုအပ်လျှင်)
[vars]
# ပုံတွေကို ပြန်ပြဖို့ Public URL ကို ဒီမှာလည်း ထည့်ထားနိုင်ပါတယ်
NEXT_PUBLIC_R2_URL = "https://pub-73c20b61589145d9b182874824850bb4.r2.dev"